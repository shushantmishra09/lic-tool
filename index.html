<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIC Assistant</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .data-badge { background: #fff9e6; border: 1px solid #ffe58f; padding: 12px; border-radius: 8px; margin: 10px 0; font-family: monospace; font-size: 1.1rem; color: #856404; font-weight: bold; }
        .fup-box { font-weight: bold; color: #28a745; margin: 15px 0; font-size: 1.2rem; min-height: 30px; }
        .btn { display: block; width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; text-decoration: none; font-size: 1rem; }
        .btn-primary { background: #00529b; color: white; border-bottom: 4px solid #003d73; }
        .btn-primary:active { transform: translateY(2px); border-bottom: 2px solid #003d73; }
        .btn-copy { background: #e7f3ff; color: #00529b; border: 1px solid #00529b; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #00529b; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #dc3545; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="color: #00529b; margin-top: 0;">LIC Policy Assistant</h3>
    
    <div class="data-badge" id="p-num">Policy: Loading...</div>
    <div class="data-badge" id="p-dob">DOB: Loading...</div>

    <div id="fup-status" class="fup-box">
        <div class="loader"></div> Fetching FUP...
    </div>

    <button class="btn btn-copy" onclick="copyData('policy')">1. Copy Policy Number</button>
    <button class="btn btn-copy" onclick="copyData('dob')">2. Copy DOB</button>
    
    <a href="https://lic.corover.ai/" target="_blank" class="btn btn-primary" style="margin-top:20px;">
        3. Open LIC Mitra Bot
    </a>
    <p style="font-size: 0.75rem; color: #666; margin-top: 15px;">
        Step: Click <b>Get Started</b> in the bot, then paste values.
    </p>
</div>

<script>
    // 1. IMPROVED DATA EXTRACTION
    const params = new URLSearchParams(window.location.search);
    
    // Support multiple parameter names just in case (p, policy, d, dob)
    const policy = params.get('p') || params.get('policy');
    const dob = params.get('d') || params.get('dob');

    const pElem = document.getElementById('p-num');
    const dElem = document.getElementById('p-dob');
    const fStatus = document.getElementById('fup-status');

    // Update UI with received data
    if (policy) {
        pElem.innerText = "Policy: " + policy;
        fetchFUP(policy);
    } else {
        pElem.innerHTML = "<span class='error'>Policy Not Found</span>";
    }

    if (dob) {
        // decodeURIComponent handles any weird characters sent by AppSheet
        dElem.innerText = "DOB: " + decodeURIComponent(dob);
    } else {
        dElem.innerHTML = "<span class='error'>DOB Not Found</span>";
    }

    // 2. STRENGTHENED API CALL
    async function fetchFUP(p) {
        // Using corsproxy.io as a reliable middleware
        const apiUrl = "https://api.lic.corover.ai/lic_v2/chat/query/stream?lang=en";
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(apiUrl);

        try {
            const response = await fetch(proxyUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "appId": "6af707a1-457a-4d42-ac30-f2e6a1fda747",
                    "inputType": "TEXT",
                    "query": p.toString(),
                    "userToken": "681bc160-0d60-4d28-a881-e4362cdc1519"
                })
            });

            if (!response.ok) throw new Error("Network response was not ok");

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let accumulatedText = "";

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');

                for (let line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const jsonStr = line.replace('data: ', '').trim();
                            const data = JSON.parse(jsonStr);
                            if (data.text) accumulatedText += data.text;
                        } catch (e) {
                            // Ignore partial JSON or [DONE] signals
                        }
                    }
                }
            }

            // Extracting date (DD/MM/YYYY)
            const dateMatch = accumulatedText.match(/\d{2}\/\d{2}\/\d{4}/);
            
            if (dateMatch) {
                fStatus.innerHTML = "✅ FUP Date: <span style='color:#00529b'>" + dateMatch[0] + "</span>";
            } else {
                fStatus.innerHTML = "<span style='color:#666; font-size:0.9rem;'>FUP not in bot response</span>";
            }

        } catch (e) {
            console.error(e);
            fStatus.innerHTML = "<span class='error'>⚠️ API Connection Error</span>";
        }
    }

    // 3. SECURE COPY FUNCTION
    function copyData(type) {
        const val = (type === 'policy') ? policy : dob;
        if (!val) {
            alert("Error: No data to copy.");
            return;
        }

        const decodedVal = decodeURIComponent(val);
        
        // Modern Clipboard API with fallback
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(decodedVal).then(() => {
                showCopyToast(type);
            });
        } else {
            // Fallback for older browsers/non-https
            const textArea = document.createElement("textarea");
            textArea.value = decodedVal;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showCopyToast(type);
        }
    }

    function showCopyToast(type) {
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "✅ COPIED!";
        btn.style.background = "#28a745";
        btn.style.color = "white";
        
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#e7f3ff";
            btn.style.color = "#00529b";
        }, 1500);
    }
</script>

</body>
</html>
