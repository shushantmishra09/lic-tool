<script>
    const params = new URLSearchParams(window.location.search);
    
    // 1. Grab data using 'p' (from our formula) or 'Policy No.' (just in case)
    let policy = params.get('p') || params.get('Policy No.') || params.get('policy');
    let dob = params.get('d') || params.get('dob') || params.get('DOB');

    const pElem = document.getElementById('p-num');
    const dElem = document.getElementById('p-dob');
    const fStatus = document.getElementById('fup-status');

    // 2. Clean and Display Policy
    if (policy && policy !== "null" && policy !== "") {
        // Remove any leading/trailing spaces
        policy = decodeURIComponent(policy).trim();
        pElem.innerText = "Policy: " + policy;
        pElem.style.color = "#00529b";
        fetchFUP(policy);
    } else {
        pElem.innerHTML = "<span style='color:red'>Policy Not Found</span>";
        fStatus.innerText = "Check AppSheet Formula";
    }

    // 3. Clean and Display DOB
    if (dob && dob !== "null" && dob !== "") {
        dob = decodeURIComponent(dob).trim();
        dElem.innerText = "DOB: " + dob;
        dElem.style.color = "#00529b";
    } else {
        dElem.innerHTML = "<span style='color:red'>DOB Not Found</span>";
    }

    // 4. API Fetch Function
    async function fetchFUP(p) {
        const apiUrl = "https://api.lic.corover.ai/lic_v2/chat/query/stream?lang=en";
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(apiUrl);

        try {
            const response = await fetch(proxyUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "appId": "6af707a1-457a-4d42-ac30-f2e6a1fda747",
                    "inputType": "TEXT",
                    "query": p.toString(),
                    "userToken": "681bc160-0d60-4d28-a881-e4362cdc1519"
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                lines.forEach(l => {
                    if (l.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(l.replace('data: ', ''));
                            if (data.text) fullText += data.text;
                        } catch (e) {}
                    }
                });
            }

            const dateMatch = fullText.match(/\d{2}\/\d{2}\/\d{4}/);
            fStatus.innerHTML = dateMatch 
                ? "✅ Next FUP: <span style='color:#28a745'>" + dateMatch[0] + "</span>" 
                : "FUP not found in bot response";

        } catch (e) {
            fStatus.innerText = "⚠️ Connection Error";
        }
    }

    // 5. Copy Logic
    function copyData(type) {
        const val = (type === 'policy') ? policy : dob;
        if (!val) return;
        
        navigator.clipboard.writeText(val).then(() => {
            const btn = event.target;
            const oldText = btn.innerText;
            btn.innerText = "✅ COPIED!";
            setTimeout(() => { btn.innerText = oldText; }, 1200);
        });
    }
</script>
